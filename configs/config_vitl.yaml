# DINO
dino_size: 768
dino_model: "dinov3_vitl16"
dino_weights: "weights/dinov3_vitl16_pretrain_lvd1689m-8aa4cbdd.pth"
emb_dim: 1024
dino_num_layers: 24
n_classes: 2  # Binary segmentation: background (0) and foreground (1)

# Few-shot prototypes
proto_path: "prototypes/prototypes_vitl.pkl"
tau: 0.5
min_area: 200
morph_kernel: 5

# NAF
naf_scale: 4

# Depth geometry (RGB-D prototypes)
handeye_config:    "configs/handeye.yaml"
intrinsics_config: "configs/intrinsics.yaml"
depth_alpha: 0.3    # weight for XYZ centroid channels
depth_beta:  0.3    # weight for surface normal channels
depth_gamma: 0.1    # weight for depth-std channel
depth_scale: 1000.0 # mm normalization divisor (brings XYZ into ~[-1,1] range)
